# Python Code Layout Configuration
# ==============================================================================
# These files enforce PEP 8 compliance and industry standards
# No AI guessing allowed - all functions must have confirmed requirements
# ==============================================================================

[flake8]
max-line-length = 88
exclude =
    .git,
    __pycache__,
    .venv,
    .tox,
    build,
    dist,
    *egg*,
    .eggs
extend-ignore =
    # We handle these manually for clarity
    E203,  # black already handles spacing around operators
    E266,  # multiple leading hashes for section headers
    W503,  # we put commas on the same line as opening bracket
    W504,  # we put commas on the same line as closing bracket

[isort]
# Import ordering
lines_between_types = 1
force_sort_within_sections = true
force_single_line = true
include_trailing_comma = true
known_future = __future__
known_standard_library =
    abc,
    argparse,
    array,
    ast,
    atexit,
    base64,
    binascii,
    collections,
    copy,
    curses,
    dataclasses,
    datetime,
    decimal,
    difflib,
    doctest,
    email,
    enum,
    fnmatch,
    functools,
    gc,
    getopt,
    getpass,
    glob,
    gzip,
    hashlib,
    heapq,
    hmac,
    html,
    http,
    importlib,
    ipaddress,
    itertools,
    json,
    locale,
    logging,
    lzma,
    mimetypes,
    mimetools,
    operator,
    optparse,
    os,
    optparse,
    pathlib,
    pickle,
    platform,
    pipes,
    pkg_resources,
    posixpath,
    pprint,
    pstats,
    py_compile,
    pydoc,
    queue,
    random,
    re,
    reprlib,
    shutil,
    signal,
    socket,
    socketserver,
    stat,
    statistics,
    string,
    stringprep,
    struct,
    subprocess,
    sys,
    tempfile,
    tarfile,
    termios,
    textwrap,
    thread,
    threading,
    time,
    timeit,
    token,
    tokenize,
    tracemalloc,
    traceback,
    tty,
    types,
    typing,
    unittest,
    urllib,
    uuid,
    warnings,
    weakref,
    which,
    wsgiref,
    xml,
    xmlrpc,
    zipfile,
    # Backports and shims
    distro,
    importlib_metadata,
    ipython_genutils,
    packaging,
    parso,
    pexpect,
    ptyprocess,
    py,
    pygments,
    python-json-logger,
    readchar,
    ruamel.yaml,
    sqlparse,
    traitlets,
    wcwidth,
    wheel,
    yapf
known_third_party =
    boto,
    botocore,
    celery,
    django,
    flask,
    jinja2,
    numpy,
    pandas,
    requests,
    sqlalchemy,
    starlette,
    pytest,
    tox
known_first_party =
    # Add your project's top-level packages here
    # e.g., myapp, myproject
default_section = THIRDPARTY
sections =
    FUTURE,
    STANDARD_LIBRARY,
    DJANGO,
    THIRD_PARTY,
    FIRST_PARTY,
    LOCALFOLDER

[mypy]
# Type checking configuration - enforce types to reduce guessing
python_version = 3.10
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
strict_optional = true
ignore_missing_imports = true
# Enable common type hints
disallow_untyped_calls = false  # Allow for flexibility during development
no_implicit_optional = true

[mypy.plugins.django]
# Django specific settings if needed
django_settings_module =

[pyright]
# Type checker for modern Python features
pythonVersion = 3.10
typeCheckingMode = strict
useLibraryCodeForTypes = true
exclude =
    .venv,
    .tox,
    venv
reportMissingImports = error
reportMissingTypeStubs = false
reportInvalidTypeForm = error
reportInvalidCast = error
reportInvalidTypeVarUse = error
reportUnboundVariable = error
reportUndefinedVariable = error
reportOptionalMemberAccess = error
reportOptionalSubscription = error
reportUnknownParameterType = error
reportUnknownArgumentType = error
reportUnknownMemberType = error
reportUnknownVariableType = error
reportUnknownAttributeType = error
reportUnknownLambdaType = error
reportCallInDefaultNamespace = error
reportUntypedBaseClass = error
reportAttributeAccessIssue = error
reportPossiblyUnboundVariable = warning
reportOperatorIssue = warning
reportRedeclaration = error
reportDuplicateImport = error
reportImplicitAny = warning
reportImplicitOverride = error
reportIncompatibleMethodOverride = error
reportIncompatibleVariableOverride = error
reportIncompatibleTypeVarReturnType = error
reportCallInDefaultNamespace = error
reportInvalidTypeVarUse = error
reportUnknownMemberType = error
reportUnknownParameterType = error
reportUnknownVariableType = error
reportUnknownTypeAnnotation = error
reportUnknownArgumentType = error
reportUnknownReturnAnnotation = error
reportMissingTypeArgument = error
reportMissingParameterType = error
reportMissingTypeStubs = warning
reportInvalidStubStatement = error
reportUnsupportedDjangoFeature = warning
reportPrivateImportUsage = warning
reportImplicitStringImport = warning
reportCallDiscarded = warning
reportAssertAlwaysTrue = warning
reportUnusedExpression = warning
reportInvalidTypeVarUse = warning
reportSelfTypeParameterNotUsed = warning
reportReturnTypeAsArgument = warning
